api:
  base_url: "https://alqac-api.ngrok.pro"
  endpoint: "/retrieve"
  api_key_env: "ALQAC_API_KEY"
  api_key_env_fallback: "ALQAC_TOKEN"
  min_interval_seconds: 5
  timeout_seconds: 30
  max_retries: 5
  ssl_verify: false

retrieval:
  queries_per_case: 15
  min_queries_per_case: 6
  adaptive_stop: true
  max_case_evidence: 8

law_retrieval:
  method: "bm25"
  top_k: 6

prediction:
  labels: ["A_WIN", "B_WIN"]
  use_rule_override: true
  use_model_reasoner: false
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  max_input_chars: 12000
  max_new_tokens: 256

paths:
  cache_dir: "cache"
  logs_dir: "logs"
